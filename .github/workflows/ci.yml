name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Vérifie la syntaxe de tous les scripts (js/**/*.js)
        run: npm run test:syntax

      - name: Installe les dépendances de test (aucune requise par l'application, voir package.json)
        run: npm install

      - name: Tests unitaires — algorithme de clustering d'affinités (C7/C8)
        run: npm run test:unit

      - name: Installe Chromium pour le test de fumée navigateur
        run: npx playwright install --with-deps chromium

      - name: Test de fumée — wizard jusqu'à l'étape Clusters (jeu de test fictif)
        run: npm run test:smoke
